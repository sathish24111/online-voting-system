<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Ballot | IT Department Voting System</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Decorative Orbs -->
    <div class="bg-decor decor-1"></div>
    <div class="bg-decor decor-2"></div>

    <!-- Navigation Header -->
    <nav class="navbar">
        <a href="/pages/student-dashboard.html" class="logo logo-pill">
            <img src="/images/kprcas-logo.jpg" alt="KPRCAS Logo">
        </a>
        <div class="nav-links">
            <button id="theme-toggle" class="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="/pages/student-dashboard.html" class="sidebar-link"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="/pages/profile.html" class="sidebar-link"><i class="fas fa-user"></i> My Profile</a></li>


                <li style="margin-top: auto;"><a href="#" onclick="handleLogout()" class="sidebar-link" style="color: var(--danger-color);"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-content">
            <header class="mb-4" style="text-align: left; margin-bottom: 2rem;">
                <h1 id="election-header-title">Election Ballot</h1>
                <p id="election-header-desc">Please complete all steps to securely cast your ballot.</p>
            </header>

            <!-- Progress Indicator -->
            <div id="progress-wrapper" class="progress-bar-wrapper" style="display: none;">
                <div class="progress-text">
                    <span id="progress-label" style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em;">Step Progress</span>
                    <span id="step-indicator">Step 0 of 0</span>
                </div>
                <div class="progress-bar-track">
                    <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Dynamic Ballot Section -->
            <div id="ballot-container">
                <div class="glass-card text-center">
                    <div class="spinner" style="margin: 0 auto 1rem auto;"></div>
                    <p>Compiling candidates directory...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/voting.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadVotingPage();
        });
    </script>
</body>
</html>
