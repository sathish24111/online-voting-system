<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Already Voted | IT Department Voting System</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem;">
    <!-- Decorative Orbs -->
    <div class="bg-decor decor-1"></div>
    <div class="bg-decor decor-2"></div>

    <div class="glass-card text-center" style="width: 100%; max-width: 480px; padding: 3rem 2.5rem;">
        <i class="fas fa-check-double text-gradient" style="font-size: 4.5rem; color: var(--success-color); margin-bottom: 1.5rem;"></i>
        <h2 class="text-gradient">Ballot Already Cast</h2>
        <p class="mt-3 mb-4" style="font-size: 1.1rem; line-height: 1.6;">
            You have already recorded your vote for this department election. Each student is permitted to submit only one ballot to maintain democratic fairness.
        </p>

        <div style="background: rgba(37, 99, 235, 0.05); padding: 0.75rem 1rem; border-radius: var(--radius-md); margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.9rem; border: 1px solid var(--border-color);">
            <i class="fas fa-shield-alt"></i> Your vote choices remain completely anonymous.
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.75rem;">
            <a href="/pages/student-dashboard.html" class="btn btn-primary w-100">
                <i class="fas fa-home"></i> Back to Dashboard
            </a>
            <button class="btn btn-secondary w-100" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout Securely
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const session = await requireSession('STUDENT');
            // If they haven't voted, send them to dashboard
            if (session) {
                const activeResponse = await fetch('/api/voting/active-election');
                if (activeResponse.ok) {
                    const data = await activeResponse.json();
                    if (!data.hasVoted) {
                        window.location.href = '/pages/student-dashboard.html';
                    }
                }
            }
        });
    </script>
</body>
</html>
