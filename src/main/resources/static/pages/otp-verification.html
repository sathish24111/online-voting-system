<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification | IT Department Voting System</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page-body">
    <!-- Decorative Blurry Orbs -->
    <div class="bg-decor decor-1"></div>
    <div class="bg-decor decor-2"></div>

    <div class="login-card" style="text-align: center;">
        <div class="mb-4">
            <i class="fas fa-key text-gradient" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h2>Security Verification</h2>
            <p class="mt-2">We have sent a 6-digit verification OTP to your registered Gmail address. Please check your inbox.</p>
        </div>

        <!-- Expiry timer warning -->
        <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.75rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: var(--danger-color); font-weight: 600;">
            <i class="far fa-clock"></i> Code expires in: <span id="expiry-timer">05:00</span>
        </div>

        <form id="otp-form" onsubmit="verifyOtp(event)">
            <!-- OTP Input -->
            <div class="form-group">
                <input type="text" id="otpCode" class="form-control text-center" maxlength="6" placeholder="------" style="font-size: 2rem; letter-spacing: 0.3em; font-weight: 700; height: 60px;" required autofocus>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary w-100 mb-3" style="height: 50px;">
                Verify & Proceed <i class="fas fa-chevron-right"></i>
            </button>
        </form>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; font-size: 0.9rem;">
            <button id="resend-btn" class="btn btn-secondary" style="padding: 0.5rem 1rem;" onclick="resendOtp()">Resend OTP</button>
            <a href="#" onclick="handleLogout()" style="color: var(--text-muted); text-decoration: none;">Cancel / Logout</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check student session but DO NOT check otpVerified (since they need to verify it here!)
            const response = await fetch('/api/auth/status');
            const data = await response.json();
            if (!data.loggedIn) {
                window.location.href = '/pages/student-login.html';
                return;
            }
            if (data.role !== 'STUDENT') {
                window.location.href = '/pages/admin-dashboard.html';
                return;
            }
            if (data.otpVerified) {
                window.location.href = '/pages/student-dashboard.html';
                return;
            }

            // Start verification timers
            startExpiryTimer(5 * 60); // 5 minutes
            startOtpTimer(30);       // 30 seconds resend lock
        });

        // 5-minute Countdown Timer
        let expiryInterval = null;
        function startExpiryTimer(durationSeconds) {
            const display = document.getElementById('expiry-timer');
            let remaining = durationSeconds;

            if (expiryInterval) clearInterval(expiryInterval);

            expiryInterval = setInterval(() => {
                const minutes = Math.floor(remaining / 60);
                const seconds = remaining % 60;
                
                display.innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                if (remaining <= 0) {
                    clearInterval(expiryInterval);
                    showToast('OTP code has expired. Please request a new one.', 'error');
                    document.getElementById('otpCode').disabled = true;
                }
                remaining--;
            }, 1000);
        }
    </script>
</body>
</html>
