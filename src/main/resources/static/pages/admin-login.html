<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | IT Department Voting System</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page-body">
    <!-- Decorative Blurry Orbs -->
    <div class="bg-decor decor-1"></div>
    <div class="bg-decor decor-2"></div>

    <div class="login-card">
        <div class="text-center mb-4">
            <a href="/index.html" style="text-decoration: none; display: inline-block;">
                <i class="fas fa-user-shield text-gradient" style="font-size: 2.5rem; margin-bottom: 0.5rem;"></i>
            </a>
            <h2>Admin Login</h2>
            <p>Enter administrator credentials</p>
        </div>

        <form id="admin-login-form" onsubmit="adminLogin(event)">
            <!-- Username -->
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" id="username" class="form-control" placeholder="Enter username" style="padding-left: 2.8rem;" required>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div style="position: relative; margin-bottom: 0.5rem;">
                    <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" style="padding-left: 2.8rem; padding-right: 2.8rem;" required>
                    <button type="button" onclick="togglePassVisibility()" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--text-muted); cursor: pointer;">
                        <i id="eye-icon" class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Show Password Checkbox -->
            <div style="margin-bottom: 1.5rem; text-align: left; font-size: 0.85rem;">
                <label style="display: flex; align-items: center; gap: 0.25rem; cursor: pointer; color: var(--text-secondary);">
                    <input type="checkbox" onclick="togglePassVisibility()"> Show Password
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-shield-alt"></i> Login as Admin
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="/index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">
                <i class="fas fa-arrow-left"></i> Back to Homepage
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        function togglePassVisibility() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'far fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'far fa-eye';
            }
        }
    </script>
</body>
</html>
